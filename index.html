<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de calidad · Trackers</title>
<style>
  :root{
    --ink:#21242b; --ink-2:#646973; --ink-3:#9a9ea6;
    --bg:#f4f3ef; --surface:#ffffff; --border:#e5e3db; --border-2:#d8d6cd;
    --done:#1d9e75; --done-d:#0f6e56; --done-bg:#e1f5ee;
    --pend:#d3d1c7; --pend-track:#ecebe4;
    --block:#ef9f27; --block-d:#854f0b; --block-bg:#faeeda;
    --accent:#0f6e56;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    font-variant-numeric:tabular-nums lining-nums;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:0 20px 64px;}

  /* Header */
  header{background:var(--ink); color:#fff; padding:22px 0 20px;}
  .header-inner{max-width:1080px; margin:0 auto; padding:0 20px; display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;}
  .title{font-size:19px; font-weight:600; letter-spacing:-0.01em;}
  .subtitle{font-size:13px; color:#b6bac2; margin-top:3px;}
  .global{display:flex; gap:26px; align-items:flex-end;}
  .global .stat{text-align:right;}
  .global .num{font-size:26px; font-weight:600; line-height:1; letter-spacing:-0.02em;}
  .global .lbl{font-size:11px; color:#b6bac2; text-transform:uppercase; letter-spacing:0.06em; margin-top:5px;}

  /* Tabs */
  .tabs{display:flex; gap:6px; flex-wrap:wrap; padding:18px 0 4px; border-bottom:1px solid var(--border); margin-bottom:24px;}
  .tab{
    appearance:none; border:1px solid var(--border-2); background:var(--surface);
    border-radius:10px; padding:9px 14px 8px; cursor:pointer; min-width:118px; text-align:left;
    transition:border-color .12s, background .12s; color:var(--ink); font-family:inherit;
  }
  .tab:hover{border-color:var(--accent);}
  .tab.active{border-color:var(--ink); border-width:1.5px;}
  .tab .t-name{font-size:14px; font-weight:600;}
  .tab .t-sub{font-size:11px; color:var(--ink-3); margin:2px 0 7px;}
  .tab .t-bar{height:5px; border-radius:3px; background:var(--pend-track); overflow:hidden;}
  .tab .t-fill{height:100%; background:var(--done); border-radius:3px;}
  .tab.tab-empty .t-fill{background:var(--pend);}

  /* Panel */
  .panel{display:none;}
  .panel.active{display:block;}
  .panel-head{display:flex; align-items:baseline; gap:12px; margin-bottom:20px; flex-wrap:wrap;}
  .panel-head h2{font-size:22px; font-weight:600; letter-spacing:-0.02em;}
  .panel-head .meta{font-size:13px; color:var(--ink-2);}
  .badge-ej{font-size:11px; font-weight:600; color:var(--block-d); background:var(--block-bg); padding:3px 9px; border-radius:20px; letter-spacing:.02em;}

  /* Hito cards */
  .hitos{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:26px;}
  .hcard{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px 16px 14px;}
  .hcard .h-grp{font-size:11px; font-weight:600; color:var(--ink-3); text-transform:uppercase; letter-spacing:.07em;}
  .hcard .h-lbl{font-size:13px; color:var(--ink-2); margin-top:1px;}
  .hcard .h-val{font-size:23px; font-weight:600; margin:8px 0 9px; letter-spacing:-0.02em;}
  .hcard .h-val .of{font-size:13px; font-weight:400; color:var(--ink-3);}
  .hcard .h-track{height:6px; border-radius:3px; background:var(--pend-track); overflow:hidden;}
  .hcard .h-fill{height:100%; background:var(--done); border-radius:3px;}
  .hcard .h-note{font-size:11px; color:var(--ink-3); margin-top:7px;}
  .hcard.confirm .h-val{color:var(--ink-3);}

  /* Tracker grid */
  .grid-title{font-size:13px; font-weight:600; color:var(--ink-2); margin-bottom:12px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(48px,1fr)); gap:9px;}
  .tr{border:1px solid var(--border); border-radius:8px; background:var(--surface); overflow:hidden;}
  .tr.blocked{border-color:var(--block);}
  .tr .tr-n{text-align:center; font-size:10px; color:var(--ink-2); padding:4px 0 2px; font-weight:500;}
  .tr .tr-seg{display:flex; gap:1.5px; height:19px; padding:0 3px 4px;}
  .tr .tr-seg span{flex:1; border-radius:1px;}

  /* Legend */
  .legend{display:flex; flex-wrap:wrap; gap:18px; margin-top:20px; font-size:12px; color:var(--ink-2); align-items:center;}
  .legend .lg{display:flex; align-items:center; gap:7px;}
  .legend .sw{width:12px; height:12px; border-radius:3px; display:inline-block;}
  .order-note{font-size:11px; color:var(--ink-3); margin-top:10px;}

  .footer-note{margin-top:34px; padding-top:18px; border-top:1px solid var(--border); font-size:12px; color:var(--ink-3);}

  @media (max-width:560px){
    .global{gap:18px;} .global .num{font-size:22px;}
    .tab{min-width:104px;}
  }
  @media print{
    body{background:#fff;}
    header{background:#fff; color:var(--ink); border-bottom:2px solid var(--ink);}
    .subtitle,.global .lbl{color:var(--ink-2);}
    .tabs{display:none;}
    .panel{display:block !important; page-break-after:always; padding-top:18px;}
    .tab{box-shadow:none;}
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="title">Seguimiento de calidad · Trackers</div>
      <div class="subtitle">Liberación por hitos · estructura y módulos · interna y externa</div>
    </div>
    <div class="global" id="global"></div>
  </div>
</header>

<div class="wrap">
  <nav class="tabs" id="tabs"></nav>
  <div id="panels"></div>
  <div class="footer-note" id="foot"></div>
</div>

<script>
/* ============================================================
   DATOS — edita aquí. Una entrada por campo.
   total       = nº total de trackers del campo
   ei / ee     = trackers liberados en ESTRUCTURA interna / externa
   mi / me     = trackers liberados en MÓDULOS interna / externa
                 (usa null si aún no hay dato → aparece "por confirmar")
   sinMontar   = trackers sin montar (no avanzan en ningún hito)
   ejemplo     = true para marcar el campo como dato de muestra
   ============================================================ */
const FIELDS = [
  { id:21, total:51, ei:47, ee:47, mi:null, me:null, sinMontar:4 },
  { id:22, total:60, ei:38, ee:30, mi:12,  me:6,    sinMontar:9,  ejemplo:true },
  { id:23, total:44, ei:20, ee:14, mi:null, me:null, sinMontar:15, ejemplo:true },
];

const HITOS = [
  { key:'ei', grp:'Estructura', lbl:'Interna' },
  { key:'ee', grp:'Estructura', lbl:'Externa' },
  { key:'mi', grp:'Módulos',    lbl:'Interna' },
  { key:'me', grp:'Módulos',    lbl:'Externa' },
];

const C = { done:'var(--done)', pend:'var(--pend)', block:'var(--block)' };

function fieldDone(f){
  /* trackers que han completado los 4 hitos disponibles */
  const vals = HITOS.map(h=>f[h.key]).filter(v=>v!==null);
  return vals.length ? Math.min(...vals) : 0;
}
function fieldPct(f){
  const denom = f.total*4 || 1;
  const sum = HITOS.reduce((a,h)=> a + (f[h.key]===null?0:f[h.key]), 0);
  return Math.round(sum/denom*100);
}

/* ---- Global summary ---- */
(function(){
  const totalTrackers = FIELDS.reduce((a,f)=>a+f.total,0);
  const totalCells = totalTrackers*4;
  const doneCells = FIELDS.reduce((a,f)=> a + HITOS.reduce((b,h)=> b+(f[h.key]===null?0:f[h.key]),0), 0);
  const pct = totalCells? Math.round(doneCells/totalCells*100):0;
  document.getElementById('global').innerHTML =
    '<div class="stat"><div class="num">'+FIELDS.length+'</div><div class="lbl">Campos</div></div>'+
    '<div class="stat"><div class="num">'+totalTrackers+'</div><div class="lbl">Trackers</div></div>'+
    '<div class="stat"><div class="num">'+pct+'%</div><div class="lbl">Avance global</div></div>';
})();

/* ---- Tabs ---- */
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

FIELDS.forEach((f, idx)=>{
  const pct = fieldPct(f);
  const tab = document.createElement('button');
  tab.className = 'tab'+(idx===0?' active':'')+(pct===0?' tab-empty':'');
  tab.innerHTML =
    '<div class="t-name">Campo '+f.id+'</div>'+
    '<div class="t-sub">'+f.total+' trackers · '+pct+'%</div>'+
    '<div class="t-bar"><div class="t-fill" style="width:'+pct+'%"></div></div>';
  tab.onclick = ()=>select(idx);
  tabsEl.appendChild(tab);
  panelsEl.appendChild(buildPanel(f, idx===0));
});

function select(idx){
  [...tabsEl.children].forEach((t,i)=>t.classList.toggle('active', i===idx));
  [...panelsEl.children].forEach((p,i)=>p.classList.toggle('active', i===idx));
}

function buildPanel(f, active){
  const done = fieldDone(f);
  const panel = document.createElement('section');
  panel.className = 'panel'+(active?' active':'');

  /* head */
  const ej = f.ejemplo ? '<span class="badge-ej">ejemplo</span>' : '';
  let html = '<div class="panel-head"><h2>Campo '+f.id+'</h2>'+
    '<span class="meta">'+f.total+' trackers · '+f.sinMontar+' sin montar · '+done+' completos en los 4 hitos</span>'+ej+'</div>';

  /* hito cards */
  html += '<div class="hitos">';
  HITOS.forEach(h=>{
    const v = f[h.key];
    const confirm = v===null;
    const pct = confirm?0:Math.round(v/f.total*100);
    html += '<div class="hcard'+(confirm?' confirm':'')+'">'+
      '<div class="h-grp">'+h.grp+'</div>'+
      '<div class="h-lbl">'+h.lbl+'</div>'+
      '<div class="h-val">'+(confirm?'—':v)+'<span class="of"> / '+f.total+'</span></div>'+
      '<div class="h-track"><div class="h-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="h-note">'+(confirm?'por confirmar':pct+'%')+'</div>'+
    '</div>';
  });
  html += '</div>';

  /* grid */
  html += '<div class="grid-title">Detalle por tracker</div><div class="grid">';
  for(let i=0;i<f.total;i++){
    const n=i+1;
    const blocked = i >= f.total - f.sinMontar;
    let segs='';
    HITOS.forEach(h=>{
      const v=f[h.key];
      let c=C.pend;
      if(blocked) c=C.block;
      else if(v!==null && i<v) c=C.done;
      segs+='<span style="background:'+c+'"></span>';
    });
    html += '<div class="tr'+(blocked?' blocked':'')+'"><div class="tr-n">'+n+'</div><div class="tr-seg">'+segs+'</div></div>';
  }
  html += '</div>';

  /* legend */
  html += '<div class="legend">'+
    '<span class="lg"><span class="sw" style="background:var(--done)"></span>Liberado</span>'+
    '<span class="lg"><span class="sw" style="background:var(--pend)"></span>Pendiente</span>'+
    '<span class="lg"><span class="sw" style="background:var(--block)"></span>Sin montar</span>'+
  '</div>'+
  '<div class="order-note">Orden de los 4 segmentos en cada tracker: estructura interna · estructura externa · módulos interna · módulos externa</div>';

  panel.innerHTML = html;
  return panel;
}

document.getElementById('foot').textContent =
  'Edita el bloque DATOS al inicio del archivo para actualizar cada campo. Usa Ctrl/Cmd+P para imprimir o guardar en PDF (un campo por página).';
</script>
</body>
</html>
